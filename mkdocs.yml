site_name: gannon-storm-rtk-analysis
site_description: "Retrospective analysis of RTK-GNSS positioning error during the May 10-12, 2024 Gannon G5 superstorm."
site_url: "https://577industries.github.io/gannon-storm-rtk-analysis/"
repo_url: "https://github.com/577Industries/gannon-storm-rtk-analysis"
repo_name: 577Industries/gannon-storm-rtk-analysis
copyright: "Copyright 2026 577 Industries Inc."

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
    - scheme: slate
      primary: deep purple
      accent: amber

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
